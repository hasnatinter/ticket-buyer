basePath: /v1
definitions:
  app_internal_api_ticket.TicketDTO:
    properties:
      id:
        type: integer
      seat:
        type: string
    type: object
  app_pkg_errors.Error:
    properties:
      error:
        type: string
    type: object
  app_pkg_errors.Errors:
    properties:
      errors:
        items:
          type: string
        type: array
    type: object
  internal_api_booking.BookingDTO:
    properties:
      id:
        type: string
      tickets:
        items:
          $ref: '#/definitions/app_internal_api_ticket.TicketDTO'
        type: array
      user_address:
        type: string
      user_name:
        type: string
    type: object
  internal_api_booking.CreateFilter:
    properties:
      tickets:
        items:
          type: integer
        type: array
      user_address:
        maxLength: 255
        type: string
      user_name:
        maxLength: 255
        type: string
    required:
    - tickets
    - user_address
    - user_name
    type: object
  internal_api_event.EventDTO:
    properties:
      category:
        type: string
      id:
        type: string
      name:
        type: string
      start_time:
        type: string
      tickets:
        items:
          $ref: '#/definitions/app_internal_api_ticket.TicketDTO'
        type: array
      total_available_tickets:
        type: string
      venue:
        type: string
    type: object
host: localhost:8081
info:
  contact:
    email: safder.h@outlook.com
    name: Ahmed Hasnat Safder
  description: This is a sample RESTful API with limited features of ticket master
  title: APP API
  version: "1.0"
paths:
  /../healthcheck:
    get:
      description: Read health
      responses:
        "200":
          description: OK
      summary: Read health
      tags:
      - health
  /bookings/:
    post:
      consumes:
      - application/json
      description: Create booking
      parameters:
      - description: Booking form
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_api_booking.CreateFilter'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            items:
              $ref: '#/definitions/internal_api_booking.BookingDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/app_pkg_errors.Error'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/app_pkg_errors.Errors'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app_pkg_errors.Error'
      summary: Create booking
      tags:
      - bookings
  /events:
    get:
      consumes:
      - application/json
      description: List events
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_event.EventDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app_pkg_errors.Error'
      summary: List events
      tags:
      - events
  /events/{id}:
    get:
      consumes:
      - application/json
      description: Read event
      parameters:
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api_event.EventDTO'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/app_pkg_errors.Error'
      summary: Read event
      tags:
      - events
swagger: "2.0"
