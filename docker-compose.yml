services: 
  web:
    build: 
     dockerfile: ./Dockerfile
    restart: always
    ports: 
      - "8081:8080"
    env_file: .env
    volumes:
      - ./pkg:/usr/src/app/pkg
      - ./internal:/usr/src/app/internal
      - ./cmd:/usr/src/app/cmd
      - ./config:/usr/src/app/config
    networks:
      - default
    depends_on:
      - db
  db: 
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./data:/var/lib/postgresql
    ports:
      - "5434:5432"
    networks:
      - default

  test_db: 
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD_TEST}
      POSTGRES_USER: ${DB_USER_TEST}
      POSTGRES_DB: ${DB_NAME_TEST}
    ports:
      - "5435:5432"
    networks:
      - default

networks:
  default:
